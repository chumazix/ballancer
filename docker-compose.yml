version: "3.8"

networks:
  backend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  lb1:
    build:
      context: .
      dockerfile: dockerfiles/lb/Dockerfile
    container_name: lb1
    hostname: lb1
    networks:
      backend-net:
        ipv4_address: 172.20.0.10
    cap_add:
      - NET_ADMIN
    volumes:
      - ./ansible/keys:/tmp/keys:ro
    ports:
      - "22:22"   # SSH для отладки (можно не публиковать)
    restart: unless-stopped

  lb2:
    build:
      context: .
      dockerfile: dockerfiles/lb/Dockerfile
    container_name: lb2
    hostname: lb2
    networks:
      backend-net:
        ipv4_address: 172.20.0.11
    cap_add:
      - NET_ADMIN
    volumes:
      - ./ansible/keys:/tmp/keys:ro
    restart: unless-stopped

  backend1:
    build:
      context: .
      dockerfile: dockerfiles/backend/Dockerfile
    container_name: backend1
    hostname: backend1
    networks:
      backend-net:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  backend2:
    build:
      context: .
      dockerfile: dockerfiles/backend/Dockerfile
    container_name: backend2
    hostname: backend2
    networks:
      backend-net:
        ipv4_address: 172.20.0.21
    restart: unless-stopped

  ansible:
    build:
      context: .
      dockerfile: dockerfiles/ansible/Dockerfile
    container_name: ansible
    hostname: ansible
    networks:
      - backend-net
    volumes:
      - ./ansible:/ansible
    restart: unless-stopped

    victoriametrics:
    build:
      context: .
      dockerfile: dockerfiles/victoriametrics/Dockerfile
    container_name: victoriametrics
    hostname: victoriametrics
    networks:
      - backend-net
    ports:
      - "8428:8428"   # VictoriaMetrics HTTP API
    volumes:
      - ./ansible/files:/etc/victoriametrics:ro
      - vm-data:/var/lib/victoriametrics
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: dockerfiles/grafana/Dockerfile
    container_name: grafana
    hostname: grafana
    networks:
      - backend-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stoppedd

volumes:
  vm-data:
  grafana-data:
