---
- name: Configure Keepalived cluster
  hosts: lb
  become: yes
  tasks:
    - name: Install keepalived
      apt:
        name: keepalived
        state: present
        update_cache: yes

    - name: Disable rp_filter for VIP to work (must be done before starting keepalived)
      sysctl:
        name: "{{ item }}"
        value: 0
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - net.ipv4.conf.eth0.rp_filter
        - net.ipv4.conf.all.rp_filter
      when: inventory_hostname in groups['lb']

    - name: Copy keepalived configuration for lb1
      copy:
        src: /ansible/files/keepalived_lb1.conf
        dest: /etc/keepalived/keepalived.conf
      when: inventory_hostname == 'lb1'

    - name: Copy keepalived configuration for lb2
      copy:
        src: /ansible/files/keepalived_lb2.conf
        dest: /etc/keepalived/keepalived.conf
      when: inventory_hostname == 'lb2'

    - name: Ensure keepalived is started (kill old process if any)
      shell: pkill keepalived || true ; keepalived -f /etc/keepalived/keepalived.conf &
      async: 0
      poll: 0

    - name: Wait for VIP to appear
      pause:
        seconds: 3

    - name: Add keepalived to crontab for autostart (fallback)
      cron:
        name: "start keepalived"
        special_time: reboot
        job: "keepalived -f /etc/keepalived/keepalived.conf > /var/log/keepalived.log 2>&1"
        user: root

  handlers:
    - name: restart keepalived
      shell: pkill keepalived || true ; keepalived -f /etc/keepalived/keepalived.conf &
      become: yes

- name: Restart load balancers containers to apply all changes
  hosts: localhost
  become: no
  tasks:
    - name: Restart lb1 and lb2
      shell: docker restart lb1 lb2
      args:
        executable: /bin/bash
      run_once: yes
