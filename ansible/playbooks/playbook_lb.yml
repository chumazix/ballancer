---
- name: Install load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Install nginx-extras (includes stub_status)
      apt:
        name: nginx-extras
        state: present
        update_cache: yes

    - name: Copy nginx configuration for load balancing with stub_status
      copy:
        src: /ansible/files/nginx_lb.conf
        dest: /etc/nginx/nginx.conf
      notify: restart nginx

    - name: Start nginx
      command: nginx
      args:
        creates: /var/run/nginx.pid

    - name: Add nginx to crontab for autostart
      cron:
        name: "start nginx"
        special_time: reboot
        job: "nginx"
        user: root

  handlers:
    - name: restart nginx
      command: nginx -s reload
