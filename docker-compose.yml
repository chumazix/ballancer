networks:
  ha_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # Backend services
  backend1:
    build: ./backend1
    container_name: backend1
    networks:
      ha_network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped
    expose:
      - "8080"
    labels:
      - "traefik.enable=false"

  backend2:
    build: ./backend2
    container_name: backend2
    networks:
      ha_network:
        ipv4_address: 172.20.0.11
    restart: unless-stopped
    expose:
      - "8080"
    labels:
      - "traefik.enable=false"

  # Load balancers
  lb1:
    build: ./lb1
    container_name: lb1
    networks:
      ha_network:
        ipv4_address: 172.20.0.20
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    restart: unless-stopped
    ports:
      - "8081:80"
    expose:
      - "80"
      - "9145"

  lb2:
    build: ./lb2
    container_name: lb2
    networks:
      ha_network:
        ipv4_address: 172.20.0.21
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
    restart: unless-stopped
    ports:
      - "8082:80"
    expose:
      - "80"
      - "9145"

  # Monitoring
  victoriametrics:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.victoriametrics
    container_name: victoriametrics
    networks:
      ha_network:
        ipv4_address: 172.20.0.30
    ports:
      - "8428:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    restart: unless-stopped
    command:
      - "-retentionPeriod=30d"
      - "-storageDataPath=/victoria-metrics-data"

  grafana:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.grafana
    container_name: grafana
    networks:
      ha_network:
        ipv4_address: 172.20.0.31
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - victoriametrics
    restart: unless-stopped

  # Ansible automation
  ansible:
    build: ./ansible
    container_name: ansible
    networks:
      - ha_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ansible:/ansible
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  victoriametrics-data:
  grafana-data:
