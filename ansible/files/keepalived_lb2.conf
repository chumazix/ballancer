vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass secret
    }
    virtual_ipaddress {
        172.20.0.100/24 dev eth0
    }
    track_script {
        check_nginx
    }
}

vrrp_script check_nginx {
    script "/usr/bin/curl -f http://127.0.0.1:80 || exit 1"
    interval 2
    weight -10
}
