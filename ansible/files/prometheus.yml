global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets:
        - '172.20.0.10:9100'  # lb1 node_exporter
        - '172.20.0.11:9100'  # lb2 node_exporter
        - '172.20.0.20:9100'  # backend1 node_exporter
        - '172.20.0.21:9100'  # backend2 node_exporter

  - job_name: 'nginx-vts'
    static_configs:
      - targets:
        - '172.20.0.10:9913'  # nginx-vts-exporter on lb1
        - '172.20.0.11:9913'  # nginx-vts-exporter on lb2
