version: '3.8'
networks:
  backend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
services:
  lb1:
    build:
      context: .
      dockerfile: lb1/Dockerfile
    container_name: lb1
    hostname: lb1
    networks:
      backend-net:
        ipv4_address: 172.20.0.10
    ports:
      - "8081:80"
    restart: unless-stopped

  lb2:
    build:
      context: .
      dockerfile: lb2/Dockerfile
    container_name: lb2
    hostname: lb2
    networks:
      backend-net:
        ipv4_address: 172.20.0.11
    ports:
      - "8082:80"
    restart: unless-stopped

  backend1:
    build:
      context: .
      dockerfile: backend1/Dockerfile
    container_name: backend1
    hostname: backend1
    networks:
      backend-net:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  backend2:
    build:
      context: .
      dockerfile: backend2/Dockerfile
    container_name: backend2
    hostname: backend2
    networks:
      backend-net:
        ipv4_address: 172.20.0.21
    restart: unless-stopped

  ansible:
    build:
      context: .
      dockerfile: ansible/Dockerfile
    container_name: ansible
    hostname: ansible
    networks:
      - backend-net
    volumes:
      - ./ansible:/ansible
    environment:
      - ANSIBLE_CONFIG=/ansible/ansible.cfg
    command: sh -c "chmod 600 /ansible/keys/id_rsa && sleep infinity"
    restart: unless-stopped

  victoriametrics:
    build:
      context: .
      dockerfile: monitoring/victoriametrics/Dockerfile
    container_name: victoriametrics
    hostname: victoriametrics
    networks:
      backend-net:
        ipv4_address: 172.20.0.30
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/var/lib/victoriametrics
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: monitoring/grafana/Dockerfile
    container_name: grafana
    hostname: grafana
    networks:
      backend-net:
        ipv4_address: 172.20.0.31
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  vm-data:
  grafana-data:
