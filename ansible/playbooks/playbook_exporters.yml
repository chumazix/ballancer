---
- name: Install node_exporter on all nodes
  hosts: all:!monitoring
  become: yes
  tasks:
    - name: Download node_exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.6.1/node_exporter-1.6.1.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        remote_src: yes
        mode: '0755'

    - name: Start node_exporter
      shell: nohup /usr/local/bin/node_exporter > /dev/null 2>&1 &

- name: Install nginx-prometheus-exporter on load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Download nginx-prometheus-exporter
      get_url:
        url: https://github.com/nginx/nginx-prometheus-exporter/releases/download/v1.5.1/nginx-prometheus-exporter_1.5.1_linux_amd64.tar.gz
        dest: /tmp/nginx-exporter.tar.gz

    - name: Extract exporter
      unarchive:
        src: /tmp/nginx-exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/nginx-prometheus-exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/nginx-prometheus-exporter
        dest: /usr/local/bin/nginx-prometheus-exporter
        remote_src: yes
        mode: '0755'

    - name: Start nginx-prometheus-exporter
      shell: nohup /usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri http://127.0.0.1:80/nginx_status > /dev/null 2>&1 &
