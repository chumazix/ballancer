---
- name: Install node_exporter on all nodes
  hosts: all:!monitoring
  become: yes
  tasks:
    - name: Download node_exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.6.1/node_exporter-1.6.1.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        remote_src: yes
        mode: '0755'

    - name: Start node_exporter
      shell: nohup /usr/local/bin/node_exporter > /dev/null 2>&1 &

- name: Install nginx-prometheus-exporter on load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Download nginx-prometheus-exporter
      get_url:
        url: https://github.com/nginx/nginx-prometheus-exporter/releases/download/v1.5.1/nginx-prometheus-exporter_1.5.1_linux_amd64.tar.gz
        dest: /tmp/nginx-exporter.tar.gz

    - name: Extract exporter
      unarchive:
        src: /tmp/nginx-exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/nginx-prometheus-exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/nginx-prometheus-exporter
        dest: /usr/local/bin/nginx-prometheus-exporter
        remote_src: yes
        mode: '0755'

    - name: Start nginx-prometheus-exporter
      shell: nohup /usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri http://127.0.0.1:80/nginx_status > /dev/null 2>&1 &

- name: Install cron and set up automatic startup for exporters
  hosts: all:!monitoring
  become: yes
  tasks:
    - name: Install cron
      apt:
        name: cron
        state: present
        update_cache: yes

    - name: Start cron service
      service:
        name: cron
        state: started
        enabled: yes
      ignore_errors: yes

    - name: Add node_exporter to crontab
      cron:
        name: "start node_exporter"
        special_time: reboot
        job: "/usr/local/bin/node_exporter > /var/log/node_exporter.log 2>&1"
        user: root
      when: inventory_hostname != 'victoriametrics' and inventory_hostname != 'grafana'

- name: Add nginx-exporter to crontab on load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Add nginx-prometheus-exporter to crontab
      cron:
        name: "start nginx-prometheus-exporter"
        special_time: reboot
        job: "/usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri http://127.0.0.1:80/nginx_status > /var/log/nginx-exporter.log 2>&1"
        user: root

- name: Install keepalived-exporter on load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Download keepalived-exporter
      get_url:
        url: https://github.com/mehdy/keepalived-exporter/releases/download/v1.7.0/keepalived-exporter_1.7.0_linux_amd64.tar.gz
        dest: /tmp/keepalived-exporter.tar.gz

    - name: Extract keepalived-exporter
      unarchive:
        src: /tmp/keepalived-exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/keepalived-exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/keepalived-exporter
        dest: /usr/local/bin/keepalived-exporter
        remote_src: yes
        mode: '0755'

    - name: Start keepalived-exporter
      shell: nohup /usr/local/bin/keepalived-exporter > /var/log/keepalived-exporter.log 2>&1 &

    - name: Add keepalived-exporter to crontab for autostart
      cron:
        name: "start keepalived-exporter"
        special_time: reboot
        job: "/usr/local/bin/keepalived-exporter > /var/log/keepalived-exporter.log 2>&1"
        user: root
