---
- name: Configure VictoriaMetrics
  hosts: victoriametrics
  become: yes
  tasks:
    - name: Install prerequisites
      apt:
        name: wget
        state: present

    - name: Download VictoriaMetrics
      get_url:
        url: https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v1.93.0/victoria-metrics-linux-amd64-v1.93.0.tar.gz
        dest: /tmp/victoria-metrics.tar.gz

    - name: Extract
      unarchive:
        src: /tmp/victoria-metrics.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/victoria-metrics-prod

    - name: Copy binary
      copy:
        src: /usr/local/bin/victoria-metrics-prod
        dest: /usr/local/bin/victoria-metrics
        remote_src: yes
        mode: '0755'

    - name: Create directories
      file:
        path: /var/lib/victoriametrics
        state: directory

    - name: Copy prometheus.yml
      copy:
        src: /ansible/files/prometheus.yml
        dest: /etc/victoriametrics/prometheus.yml

    - name: Start VictoriaMetrics
      shell: nohup /usr/local/bin/victoria-metrics -storageDataPath=/var/lib/victoriametrics -httpListenAddr=:8428 -promscrape.config=/etc/victoriametrics/prometheus.yml > /var/log/victoriametrics.log 2>&1 &
      become: yes

- name: Configure Grafana
  hosts: grafana
  become: yes
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - wget
          - fontconfig
          - openssl
          - ca-certificates
        state: present
        update_cache: yes

    - name: Download Grafana OSS
      shell: wget --no-check-certificate --progress=dot -c https://dl.grafana.com/oss/release/grafana-11.6.0.linux-amd64.tar.gz -O /tmp/grafana.tar.gz
      args:
        creates: /tmp/grafana.tar.gz
      become: yes

    - name: Extract Grafana
      unarchive:
        src: /tmp/grafana.tar.gz
        dest: /usr/local/
        remote_src: yes

    - name: Find extracted Grafana directory
      find:
        paths: /usr/local
        patterns: "grafana-*"
        file_type: directory
      register: grafana_dir

    - name: Create symlink for Grafana
      file:
        src: "{{ grafana_dir.files[0].path }}"
        dest: /usr/local/grafana
        state: link
      when: grafana_dir.files | length > 0

    - name: Create Grafana data directory
      file:
        path: /var/lib/grafana
        state: directory

    - name: Create Grafana logs directory
      file:
         path: /var/log/grafana
         state: directory

    - name: Create Grafana provisioning directories
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - /etc/grafana/provisioning/datasources
        - /etc/grafana/provisioning/dashboards

    - name: Copy datasource configuration
      copy:
        src: /ansible/files/grafana_datasource.yml
        dest: /etc/grafana/provisioning/datasources/victoriametrics.yml

    - name: Copy dashboard provider configuration
      copy:
        src: /ansible/files/dashboards/dashboard.yml
        dest: /etc/grafana/provisioning/dashboards/dashboard.yml

    - name: Copy dashboard JSON
      copy:
        src: /ansible/files/dashboards/system_dashboard.json
        dest: /etc/grafana/provisioning/dashboards/system_dashboard.json

    - name: Stop Grafana if running
      shell: |
        pkill -f grafana-server || true
        killall grafana-server 2>/dev/null || true
        rm -f /var/run/grafana-server.pid 2>/dev/null || true
      ignore_errors: yes

    - name: Start Grafana
      shell: nohup /usr/local/grafana/bin/grafana-server -homepath /usr/local/grafana -config /usr/local/grafana/conf/defaults.ini > /var/log/grafana.log 2>&1 &

    - name: Wait for Grafana to start
      wait_for:
        port: 3000
        host: grafana
        timeout: 60

    - name: Create VictoriaMetrics datasource via API
      uri:
        url: http://grafana:3000/api/datasources
        method: POST
        user: admin
        password: admin
        force_basic_auth: yes
        body_format: json
        body:
          name: VictoriaMetrics
          type: prometheus
          url: http://victoriametrics:8428
          access: proxy
          isDefault: true
        status_code: 200
      register: datasource_result
      failed_when: datasource_result.status != 200 and datasource_result.json.message != "Data source with same name already exists"

    - name: Import dashboard via API
      uri:
        url: http://grafana:3000/api/dashboards/db
        method: POST
        user: admin
        password: admin
        force_basic_auth: yes
        body_format: json
        body:
          dashboard: "{{ lookup('file', '/ansible/files/dashboards/system_dashboard.json') | from_json }}"
          overwrite: true
        status_code: 200
