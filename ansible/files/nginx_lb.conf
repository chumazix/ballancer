user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    upstream backend {
        server 172.20.0.20:8080 max_fails=3 fail_timeout=30s;
        server 172.20.0.21:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /nginx_status {
            stub_status;
            access_log off;
            allow 172.20.0.0/16;  # разрешаем доступ только из внутренней сети
            deny all;
        }
    }
}
