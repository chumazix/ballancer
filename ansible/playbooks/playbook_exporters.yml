---
- name: Install node_exporter on all nodes
  hosts: all:!monitoring
  become: yes
  tasks:
    - name: Download node_exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.6.1/node_exporter-1.6.1.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/node_exporter-1.6.1.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        remote_src: yes
        mode: '0755'

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
      ignore_errors: yes  # systemd может не работать, но мы запустим командой

    - name: Fallback start node_exporter (if systemd fails)
      command: /usr/local/bin/node_exporter
      async: 0
      poll: 0
      when: systemd_failed is undefined

- name: Install nginx-prometheus-exporter on load balancers
  hosts: lb
  become: yes
  tasks:
    - name: Download nginx-prometheus-exporter
      get_url:
        url: https://github.com/nginxinc/nginx-prometheus-exporter/releases/download/v0.11.0/nginx-prometheus-exporter-0.11.0-linux-amd64.tar.gz
        dest: /tmp/nginx-exporter.tar.gz

    - name: Extract exporter
      unarchive:
        src: /tmp/nginx-exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        creates: /usr/local/bin/nginx-prometheus-exporter

    - name: Copy binary to path
      copy:
        src: /usr/local/bin/nginx-prometheus-exporter
        dest: /usr/local/bin/nginx-prometheus-exporter
        remote_src: yes
        mode: '0755'

    - name: Start nginx-prometheus-exporter
      command: /usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri http://127.0.0.1:80/nginx_status
      async: 0
      poll: 0
      become: yes
